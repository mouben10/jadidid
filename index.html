<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ميكانيكي متنقل | الجزائر</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Tajawal', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .app-container { max-width: 500px; width: 100%; }
    .card {
      background: white;
      border-radius: 30px;
      padding: 35px;
      margin: 20px 0;
      box-shadow: 0 25px 50px rgba(0,0,0,0.2);
    }
    .logo { text-align: center; margin-bottom: 30px; }
    .logo h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .logo span { -webkit-text-fill-color: #f4a261; }
    input, select {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border: 2px solid #e0e0e0;
      border-radius: 50px;
      font-family: 'Tajawal', sans-serif;
    }
    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 50px;
      font-weight: bold;
      cursor: pointer;
    }
    .btn-outline {
      background: transparent;
      border: 2px solid #667eea;
      color: #667eea;
    }
    .status {
      margin-top: 15px;
      text-align: center;
      padding: 10px;
      border-radius: 50px;
      font-weight: bold;
    }
    .status.error { background: #fee; color: #c33; }
    .status.success { background: #efe; color: #3a6; }
    .user-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 15px 20px;
      border-radius: 50px;
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .user-header button {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      padding: 8px 18px;
      border-radius: 25px;
      cursor: pointer;
    }
    hr { margin: 20px 0; }
    .text-center { text-align: center; }
  </style>
</head>
<body>
  <div class="app-container" id="app"></div>

  <script>
    // ===================== رابط Web App حقك =====================
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyTtPUckGgR_VasK9wMI5kGU0zuGvxoPfWmPxIWTYgBcFnFLr8QO6Ag-w4UZ-7EurEoTw/exec";
    
    const STORAGE_KEY = "loggedInUser";
    
    function saveUser(email) { localStorage.setItem(STORAGE_KEY, email); }
    function getUser() { return localStorage.getItem(STORAGE_KEY); }
    function logout() { localStorage.removeItem(STORAGE_KEY); renderApp(); }
    
    // ✅ هنا加了 mode: "no-cors"
    async function register(email, password) {
      try {
        await fetch(SCRIPT_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ type: "register", email, password })
        });
        return { result: "success", message: "تم إنشاء الحساب" };
      } catch(e) {
        return { result: "error", message: "فشل الاتصال" };
      }
    }
    
    // ✅ هنا加了 mode: "no-cors"
    async function login(email, password) {
      try {
        await fetch(SCRIPT_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ type: "login", email, password })
        });
        return { result: "success", message: "تم الدخول", email: email };
      } catch(e) {
        return { result: "error", message: "فشل الاتصال" };
      }
    }
    
    // ✅ هنا加了 mode: "no-cors"
    async function sendOrder(email, car_model, car_year, issue_type, location) {
      try {
        await fetch(SCRIPT_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ type: "order", email, car_model, car_year, issue_type, location })
        });
        return { result: "success", message: "تم إرسال الطلب" };
      } catch(e) {
        return { result: "error", message: "فشل الاتصال" };
      }
    }
    
    function renderLogin() {
      return `
        <div class="card">
          <div class="logo"><h1>ميكانيكي <span>متنقل</span> 🇩🇿</h1></div>
          <h2 class="text-center">🔐 تسجيل الدخول</h2>
          <form id="loginForm">
            <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" required>
            <input type="password" id="loginPassword" placeholder="كلمة السر" required>
            <button type="submit" class="btn">دخول</button>
          </form>
          <div id="loginStatus" class="status"></div>
          <hr>
          <button id="showRegisterBtn" class="btn btn-outline">إنشاء حساب جديد</button>
        </div>
      `;
    }
    
    function renderRegister() {
      return `
        <div class="card">
          <div class="logo"><h1>ميكانيكي <span>متنقل</span> 🇩🇿</h1></div>
          <h2 class="text-center">📝 إنشاء حساب</h2>
          <form id="registerForm">
            <input type="email" id="regEmail" placeholder="البريد الإلكتروني" required>
            <input type="password" id="regPassword" placeholder="كلمة السر" required>
            <input type="password" id="regConfirm" placeholder="تأكيد كلمة السر" required>
            <button type="submit" class="btn">تسجيل</button>
          </form>
          <div id="registerStatus" class="status"></div>
          <hr>
          <button id="showLoginBtn" class="btn btn-outline">تسجيل الدخول</button>
        </div>
      `;
    }
    
    function renderDashboard(email) {
      return `
        <div class="user-header">
          <span>👤 ${email}</span>
          <button id="logoutBtn">خروج</button>
        </div>
        <div class="card">
          <h2 class="text-center">🚨 طلب ميكانيكي</h2>
          <form id="orderForm">
            <input type="text" id="car_model" placeholder="موديل السيارة" required>
            <input type="text" id="car_year" placeholder="السنة" required>
            <select id="issue_type" required>
              <option value="">نوع العطل</option>
              <option>بطارية</option><option>إطار</option><option>محرك</option>
              <option>سحب</option><option>فحص كمبيوتر</option>
            </select>
            <input type="text" id="location" placeholder="الولاية والحي" required>
            <button type="submit" class="btn">إرسال الطلب</button>
          </form>
          <div id="orderStatus" class="status"></div>
        </div>
      `;
    }
    
    let currentView = "login";
    
    function attachLoginEvents() {
      document.getElementById('loginForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        const statusDiv = document.getElementById('loginStatus');
        
        statusDiv.innerHTML = "⏳ جاري...";
        const result = await login(email, password);
        
        if (result.result === "success") {
          saveUser(email);
          renderApp();
        } else {
          statusDiv.innerHTML = "❌ فشل، تأكد من البيانات";
          statusDiv.className = "status error";
        }
      });
      document.getElementById('showRegisterBtn')?.addEventListener('click', () => {
        currentView = "register";
        renderApp();
      });
    }
    
    function attachRegisterEvents() {
      document.getElementById('registerForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regConfirm').value;
        const statusDiv = document.getElementById('registerStatus');
        
        if (password !== confirm) {
          statusDiv.innerHTML = "❌ كلمة السر غير متطابقة";
          statusDiv.className = "status error";
          return;
        }
        
        statusDiv.innerHTML = "⏳ جاري...";
        const result = await register(email, password);
        
        if (result.result === "success") {
          statusDiv.innerHTML = "✅ تم إنشاء الحساب! جاري التحويل...";
          statusDiv.className = "status success";
          setTimeout(() => { currentView = "login"; renderApp(); }, 1500);
        } else {
          statusDiv.innerHTML = "❌ فشل، حاول مرة أخرى";
          statusDiv.className = "status error";
        }
      });
      document.getElementById('showLoginBtn')?.addEventListener('click', () => {
        currentView = "login";
        renderApp();
      });
    }
    
    function attachDashboardEvents(email) {
      document.getElementById('orderForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const car_model = document.getElementById('car_model').value;
        const car_year = document.getElementById('car_year').value;
        const issue_type = document.getElementById('issue_type').value;
        const location = document.getElementById('location').value;
        const statusDiv = document.getElementById('orderStatus');
        
        statusDiv.innerHTML = "⏳ جاري إرسال الطلب...";
        const result = await sendOrder(email, car_model, car_year, issue_type, location);
        
        if (result.result === "success") {
          statusDiv.innerHTML = "✅ تم إرسال طلبك! سنتصل بك قريباً";
          statusDiv.className = "status success";
          document.getElementById('orderForm').reset();
        } else {
          statusDiv.innerHTML = "❌ فشل الإرسال";
          statusDiv.className = "status error";
        }
      });
      document.getElementById('logoutBtn')?.addEventListener('click', logout);
    }
    
    function renderApp() {
      const user = getUser();
      const app = document.getElementById('app');
      if (user) {
        app.innerHTML = renderDashboard(user);
        attachDashboardEvents(user);
      } else {
        app.innerHTML = currentView === "login" ? renderLogin() : renderRegister();
        if (currentView === "login") attachLoginEvents();
        else attachRegisterEvents();
      }
    }
    
    renderApp();
  </script>
</body>
</html>
